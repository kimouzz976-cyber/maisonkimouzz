<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Kimouzz V2</title>

<meta name="theme-color" content="#0f172a">

<style>
body{
margin:0;
font-family:Arial;
background:#f6f7fb;
color:#111;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#0f172a;
color:white;
position:sticky;
top:0;
z-index:10;
}

/* HERO */
.hero{
padding:60px 20px;
text-align:center;
background:#111827;
color:white;
}

.hero h1{font-size:40px;}
.hero p{opacity:.8}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,.05);
}

/* BUTTONS */
button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.primary{background:#0f172a;color:white;}
.green{background:#16a34a;color:white;}
.orange{background:#f59e0b;color:white;}
.red{background:#ef4444;color:white;}

/* CART */
.cart{
position:fixed;
right:0;
top:0;
width:380px;
height:100%;
background:white;
box-shadow:-10px 0 30px rgba(0,0,0,.2);
padding:15px;
overflow:auto;
display:none;
z-index:999;
}

/* LOGIN */
.login{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.login-box{
background:white;
padding:20px;
border-radius:15px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

.kmz{
background:#16a34a;
color:white;
padding:10px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div class="login" id="loginBox">
<div class="login-box">
<h3>🌴 Maison Kimouzz</h3>
<p>Créer ou entrer votre profil</p>
<input id="username" placeholder="Nom utilisateur">
<button class="primary" onclick="login()">Entrer</button>
</div>
</div>

<!-- HEADER -->
<header>
<div>🌴 Kimouzz V2</div>
<div>
🪙 <span id="kmz">0</span> KMZ
<button onclick="toggleCart()">🛒</button>
</div>
</header>

<!-- HERO -->
<section class="hero">
<h1>Produire • Consommer • Local</h1>
<p>Mayotte — Agriculture • Pêche • Élevage • Restauration</p>
</section>

<!-- PRODUCTS -->
<section class="grid" id="products"></section>

<!-- RESTAURANTS -->
<section class="grid">
<div class="card">🐟 Restaurant poisson local</div>
<div class="card">🥘 Cuisine mahoraise</div>
<div class="card">🥩 Boucherie locale</div>
</section>

<!-- CART -->
<div class="cart" id="cart">
<h3>🛒 Panier</h3>
<div id="cartItems"></div>

<p><b>Total:</b> <span id="total">0</span>€</p>

<p class="kmz">🪙 KMZ gagnés: <span id="kmzGain">0</span></p>

<button class="green" onclick="checkout()">Commander</button>
<button class="red" onclick="clearCart()">Vider</button>
<button onclick="toggleCart()">Fermer</button>
</div>

<script>

/* =========================
   DATA SYSTEM
========================= */

let user = JSON.parse(localStorage.getItem("user")) || null;
let kmz = Number(localStorage.getItem("kmz")) || 0;

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const products = [
{name:"Banane",price:20,icon:"🍌"},
{name:"Œufs",price:8,icon:"🥚"},
{name:"Poulet",price:12,icon:"🐔"},
{name:"Poisson",price:25,icon:"🐟"},
{name:"Fromage",price:15,icon:"🧀"},
{name:"Mangue",price:6,icon:"🥭"}
];

/* =========================
   LOGIN
========================= */

function login(){
let name=document.getElementById("username").value;
if(!name) return;

user={name};
localStorage.setItem("user",JSON.stringify(user));

document.getElementById("loginBox").style.display="none";
render();
}

if(user){
document.getElementById("loginBox").style.display="none";
}

/* =========================
   PRODUCTS
========================= */

function renderProducts(){
const box=document.getElementById("products");
box.innerHTML="";

products.forEach(p=>{
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div style="font-size:50px">${p.icon}</div>
<h3>${p.name}</h3>
<p>${p.price}€</p>
`;

let btn=document.createElement("button");
btn.className="primary";
btn.innerText="Ajouter";

btn.onclick=()=>{
addToCart(p);
};

div.appendChild(btn);
box.appendChild(div);
});
}

/* =========================
   CART SYSTEM
========================= */

function addToCart(p){

let item=cart.find(i=>i.name===p.name);

if(item) item.qty++;
else cart.push({...p,qty:1});

kmz += 1; // 🪙 reward

save();
render();
}

function renderCart(){

let box=document.getElementById("cartItems");
box.innerHTML="";

let total=0;

cart.forEach(i=>{
total += i.price*i.qty;

let div=document.createElement("div");
div.innerHTML=`
${i.name} x${i.qty}
`;

box.appendChild(div);
});

document.getElementById("total").innerText=total;
document.getElementById("kmz").innerText=kmz;
document.getElementById("kmzGain").innerText=kmz;
}

function clearCart(){
cart=[];
save();
render();
}

/* =========================
   CHECKOUT
========================= */

function checkout(){

if(cart.length===0) return alert("Panier vide");

let msg="Commande Kimouzz\n\n";

msg += "Client: " + user.name + "\n\n";

cart.forEach(i=>{
msg += `${i.name} x${i.qty}\n`;
});

let total=cart.reduce((a,b)=>a+b.price*b.qty,0);

msg += "\nTotal: " + total + "€";
msg += "\nKMZ: " + kmz;

window.open("https://wa.me/33789583650?text="+encodeURIComponent(msg));
}

/* =========================
   STORAGE
========================= */

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
localStorage.setItem("kmz",kmz);
}

/* =========================
   UI
========================= */

function toggleCart(){
let c=document.getElementById("cart");
c.style.display = c.style.display==="block"?"none":"block";
}

/* =========================
   MAIN
========================= */

function render(){
renderProducts();
renderCart();
}

render();

</script>

</body>
</html>
