<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnOnline Pro Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #050816;
      color: white;
    }

    header {
      background: linear-gradient(90deg, #0f172a, #1e3a8a);
      padding: 25px;
      text-align: center;
    }

    h1 {
      margin: 0;
      color: #38bdf8;
    }

    .sub {
      color: #cbd5e1;
    }

    .topbar {
      display: flex;
      justify-content: space-around;
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      flex: 1;
      margin: 5px;
    }

    .money {
      font-size: 28px;
      color: #22c55e;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      margin: 15px 0;
      border-radius: 12px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #38bdf8;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    input {
      padding: 10px;
      width: 80%;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  <h1>💰 EarnOnline Pro</h1>
  <p class="sub">Plateforme de micro-revenus en ligne</p>
</header>

<!-- TOP STATS -->
<div class="topbar">

  <div class="card">
    <h3>💰 Gains estimés</h3>
    <div class="money" id="money">0€</div>
  </div>

  <div class="card">
    <h3>📊 Activité</h3>
    <p>Active</p>
  </div>

  <div class="card">
    <h3>👤 Utilisateur</h3>
    <p>Invité</p>
  </div>

</div>

<div class="container">

  <!-- LOGIN FAKE -->
  <div class="box">
    <h2>🔐 Connexion</h2>
    <input type="text" placeholder="Pseudo">
    <br>
    <input type="password" placeholder="Mot de passe">
    <br>
    <a class="btn" href="#">Se connecter</a>
  </div>

  <!-- PLATEFORMES -->
  <div class="box">
    <h2>📊 Sondages</h2>
    <a class="btn" href="https://www.attapoll.com" target="_blank">AttaPoll</a>
  </div>

  <div class="box">
    <h2>💼 Freelance</h2>
    <a class="btn" href="https://www.fiverr.com" target="_blank">Fiverr</a>
  </div>

  <div class="box">
    <h2>🎮 Micro-tâches</h2>
    <a class="btn" href="https://www.swagbucks.com" target="_blank">Swagbucks</a>
  </div>

</div>

<footer>
  © 2026 EarnOnline Pro - Dashboard éducatif
</footer>

<!-- SIMPLE ANIMATION -->
<script>
  let money = 0;
  setInterval(() => {
    money += Math.floor(Math.random() * 3);
    document.getElementById("money").innerText = money + "€";
  }, 2000);
</script>

</body>
</html>
