<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maison Kimouzz</title>

<meta name="description" content="Produits frais et locaux de Mayotte - Maison Kimouzz">
<meta name="keywords" content="Mayotte, fruits, légumes, livraison, boutique en ligne, Maison Kimouzz">

<!-- SEO Open Graph -->
<meta property="og:title" content="Maison Kimouzz - Produits frais de Mayotte">
<meta property="og:description" content="Commandez des produits frais locaux avec livraison rapide">
<meta property="og:type" content="website">
<meta property="og:image" content="8809.jpg">
<meta property="og:url" content="https://kimouzz976-cyber.github.io/mon-site/">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#f6f7fb;
  color:#1f1f1f;
}

/* HEADER / HERO etc (inchangé pour lisibilité) */
header{
  position:sticky;top:0;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(10px);
  padding:16px;
  text-align:center;
  font-weight:800;
  font-size:20px;
  z-index:100;
}

.hero{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
  padding:60px 20px;
  border-radius:0 0 30px 30px;
}

.hero h1{font-size:40px;}

.search-box{display:flex;justify-content:center;padding:20px;}

.search-box input{
  width:100%;max-width:500px;
  padding:16px;border-radius:16px;
  border:none;outline:none;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  text-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.06);
}

.price{color:#16a34a;font-weight:800;}

.add-btn{
  width:100%;
  padding:12px;
  border-radius:12px;
  background:#0f172a;
  color:white;
  border:none;
  cursor:pointer;
}

/* CART MOBILE PRO */
.cart{
  position:fixed;
  right:20px;
  top:160px;
  width:350px;
  max-height:80vh;
  overflow:auto;
  background:white;
  border-radius:18px;
  padding:15px;
  display:none;
  z-index:999;
}

@media(max-width:768px){
  .cart{
    width:100%;
    height:100vh;
    top:0;
    right:0;
    border-radius:0;
  }
}

/* FLOAT */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;height:60px;
  background:#25d366;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:30px;
}
</style>
</head>

<body>

<header>🌴 Maison Kimouzz</header>

<section class="hero">
  <h1>🥭 Produits frais de Mayotte</h1>
  <p>Qualité • Local • Rapide</p>
</section>

<div class="search-box">
  <input id="search" placeholder="Rechercher..." oninput="App.renderProducts()">
</div>

<button class="cart-btn" onclick="toggleCart()">🧺 <span id="count">0</span></button>

<div class="cart" id="cartBox">
  <h2>🛒 Panier</h2>
  <div id="cart"></div>

  <p><b>Total :</b> <span id="total">0</span>€</p>
  <p id="deliveryInfo">📍 Retrait à Chiconi</p>

  <input id="clientName" placeholder="Nom">
  <input id="clientAddress" placeholder="Adresse">

  <button onclick="orderWhatsApp()" class="add-btn">WhatsApp</button>
  <button onclick="orderEmail()" class="add-btn">Email</button>
  <button onclick="clearCart()" class="add-btn" style="background:red;">Vider</button>
</div>

<div class="products" id="products"></div>

<a class="whatsapp-float" href="https://wa.me/33789583650">💬</a>

<script>

/* SAFE LOAD */
function loadCart(){
  try {
    return JSON.parse(localStorage.getItem("cart")) || [];
  } catch(e){
    localStorage.removeItem("cart");
    return [];
  }
}

/* APP STRUCTURE */
const App = {

  products: [
    {name:"Banane", price:20, icon:"🍌", stock:"En stock"},
    {name:"Œufs", price:8, icon:"🥚", stock:"Disponible"},
    {name:"Poule", price:10, icon:"🐔", stock:"Disponible"},
    {name:"Canard", price:35, icon:"🦆", stock:"Stock limité"}
  ],

  cart: loadCart(),

  save(){
    localStorage.setItem("cart", JSON.stringify(this.cart));
  },

  getTotal(){
    return this.cart.reduce((t,i)=>t+i.price*i.qty,0);
  },

  add(name,price){

    const item = this.cart.find(i=>i.name===name);

    if(item) item.qty++;
    else this.cart.push({name,price,qty:1});

    this.save();
    this.renderCart();
  },

  increase(i){
    this.cart[i].qty++;
    this.save();
    this.renderCart();
  },

  decrease(i){
    this.cart[i].qty--;
    if(this.cart[i].qty<=0) this.cart.splice(i,1);
    this.save();
    this.renderCart();
  },

  renderProducts(){

    const box = document.getElementById("products");
    box.innerHTML = "";

    const search = document.getElementById("search").value.toLowerCase();

    this.products
      .filter(p=>p.name.toLowerCase().includes(search))
      .forEach(p=>{

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div style="font-size:50px">${p.icon}</div>
          <h3>${p.name}</h3>
          <p>${p.stock}</p>
          <div class="price">${p.price}€</div>
        `;

        const btn = document.createElement("button");
        btn.className = "add-btn";
        btn.textContent = "Ajouter";
        btn.onclick = () => this.add(p.name,p.price);

        card.appendChild(btn);
        box.appendChild(card);
      });
  },

  renderCart(){

    const box = document.getElementById("cart");
    box.innerHTML = "";

    if(this.cart.length===0){
      box.innerHTML = "<p>Panier vide</p>";
    }

    this.cart.forEach((i,index)=>{

      const div = document.createElement("div");

      div.innerHTML = `
        <p>${i.name} (${i.qty})</p>
        <button onclick="App.decrease(${index})">-</button>
        <button onclick="App.increase(${index})">+</button>
      `;

      box.appendChild(div);
    });

    const total = this.getTotal();

    document.getElementById("total").textContent = total;
    document.getElementById("count").textContent =
      this.cart.reduce((a,b)=>a+b.qty,0);

    document.getElementById("deliveryInfo").textContent =
      total>=70 ? "🚚 Livraison gratuite" : "📍 Retrait à Chiconi";
  }
};

/* CART UI */
function toggleCart(){
  const c = document.getElementById("cartBox");
  c.style.display = c.style.display==="block" ? "none" : "block";
}

/* WHATSAPP */
function orderWhatsApp(){

  const name = document.getElementById("clientName").value;
  const address = document.getElementById("clientAddress").value;

  if(!name || !address) return alert("Nom + adresse requis");

  let msg = `🛒 Maison Kimouzz\n\n${name}\n${address}\n\n`;

  let total = 0;

  App.cart.forEach(i=>{
    msg += `- ${i.name} x${i.qty}\n`;
    total += i.price*i.qty;
  });

  msg += `\nTotal: ${total}€`;

  window.open("https://wa.me/33789583650?text="+encodeURIComponent(msg));
}

/* EMAIL */
function orderEmail(){

  let body = "Commande\n\n";
  let total = 0;

  App.cart.forEach(i=>{
    body += `${i.name} x${i.qty}\n`;
    total += i.price*i.qty;
  });

  body += `\nTotal: ${total}€`;

  window.location.href =
    "mailto:maisonkimouzzz@gmail.com?subject=Commande&body="
    + encodeURIComponent(body);
}

/* CLEAR */
function clearCart(){
  App.cart = [];
  App.save();
  App.renderCart();
}

/* INIT */
App.renderProducts();
App.renderCart();

</script>

</body>
</html>
