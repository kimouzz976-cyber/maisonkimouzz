<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Kimouzz - E-commerce Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{background:#081420;color:white;}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo-area{display:flex;gap:10px;align-items:center}
.logo{width:50px;height:50px;border-radius:12px}

/* HERO */
.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1542838132-92c53300491e') center/cover;
}

/* PRODUCTS */
.section{padding:100px 20px;max-width:1100px;margin:auto;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:15px;
padding:10px;
}

.card img{width:100%;height:150px;object-fit:cover;border-radius:10px}

.price{color:#ffdd00;font-weight:bold}

/* BUTTON */
button{
padding:8px;
border:none;
width:100%;
margin-top:5px;
cursor:pointer;
border-radius:8px;
background:linear-gradient(90deg,#ffdd00,#ff7b00);
font-weight:bold;
}

/* CART */
.cart{
position:fixed;
right:10px;
bottom:10px;
width:320px;
background:rgba(0,0,0,0.9);
padding:15px;
border-radius:15px;
z-index:2000;
}

.cart-item{
display:flex;
justify-content:space-between;
font-size:14px;
margin:5px 0;
}

.total{color:#ffdd00;font-weight:bold}

/* ADMIN */
#adminPanel{
display:none;
position:fixed;
top:80px;
right:10px;
background:#000;
padding:15px;
border-radius:10px;
width:260px;
z-index:3000;
}

#adminPanel input{
width:100%;
margin:5px 0;
padding:5px;
}

/* EDIT MODE */
.editable{
outline:1px dashed #ffdd00;
}
</style>
</head>

<body>

<header>
<div class="logo-area">
<img class="logo" src="https://images.unsplash.com/photo-1606787366850-de6330128bfc">
<h3>Maison Kimouzz</h3>
</div>

<button onclick="loginAdmin()">Admin</button>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h1>Produits de Mayotte</h1>
<p>Frais • Local • Authentique</p>
</div>
</section>

<!-- PRODUCTS -->
<section class="section">
<h2>Produits</h2>
<div class="products" id="productList"></div>
</section>

<!-- CART -->
<div class="cart">
<h3>🛒 Panier</h3>
<div id="cartList"></div>
<div class="total">Total: <span id="total">0</span>€</div>
<button onclick="checkout()">Commander</button>
<button onclick="clearCart()" style="background:#333;color:white;">Vider</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">
<h3>Admin</h3>

<input id="name" placeholder="Nom">
<input id="price" placeholder="Prix">
<input id="img" placeholder="Image URL">
<input id="stock" placeholder="Stock">

<button onclick="addProduct()">Ajouter</button>
</div>

<script>

/* ADMIN LOGIN */
let isAdmin=false;

function loginAdmin(){
let pass=prompt("Mot de passe admin ?");
if(pass==="1234"){
isAdmin=true;
document.getElementById("adminPanel").style.display="block";
alert("Accès admin OK");
}else{
alert("Mauvais mot de passe");
}
}

/* DATA */
let products=JSON.parse(localStorage.getItem("products"))||[
{name:"Banane verte",price:20,stock:10,img:"https://images.unsplash.com/photo-1603833665858-e61d17a86224"},
{name:"Œufs",price:8,stock:20,img:"https://images.unsplash.com/photo-1587486913049-53fc88980cfc"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

/* SAVE */
function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* PRODUCTS */
function renderProducts(){
let box=document.getElementById("productList");
box.innerHTML="";

products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">

<h3 contenteditable="${isAdmin}" onblur="edit(${i},'name',this.innerText)">${p.name}</h3>

<div class="price">
<span contenteditable="${isAdmin}" onblur="edit(${i},'price',this.innerText)">
${p.price}
</span>€
</div>

<p>Stock: ${p.stock}</p>

<button onclick="add(${i})">Ajouter</button>

${isAdmin?`
<button onclick="del(${i})" style="background:red;color:white;">❌ Supprimer</button>
`:``}

</div>`;
});
}

/* EDIT */
function edit(i,key,val){
if(key==="price") val=parseFloat(val);
products[i][key]=val;
save();
renderProducts();
}

/* ADD PRODUCT */
function addProduct(){
products.push({
name:name.value,
price:parseFloat(price.value),
img:img.value,
stock:parseInt(stock.value)
});
save();
renderProducts();
}

/* DELETE */
function del(i){
if(confirm("Supprimer ?")){
products.splice(i,1);
save();
renderProducts();
}
}

/* CART */
function add(i){
if(products[i].stock<=0){alert("Rupture");return;}

products[i].stock--;

let found=cart.find(c=>c.name===products[i].name);

if(found) found.qty++;
else cart.push({...products[i],qty:1});

save();
renderCart();
renderProducts();
}

function renderCart(){
let box=document.getElementById("cartList");
box.innerHTML="";
let total=0;

cart.forEach(c=>{
total+=c.price*c.qty;
box.innerHTML+=`
<div class="cart-item">
<span>${c.name} x${c.qty}</span>
<span>${c.price*c.qty}€</span>
</div>`;
});

document.getElementById("total").innerText=total;
}

/* CLEAR */
function clearCart(){
cart=[];
save();
renderCart();
}

/* CHECKOUT */
function checkout(){
let msg="Commande Maison Kimouzz%0A%0A";
let total=0;

cart.forEach(i=>{
total+=i.price*i.qty;
msg+=`${i.name} x${i.qty} = ${i.price*i.qty}€%0A`;
});

msg+=`%0ATotal: ${total}€`;

window.open("https://wa.me/33789583650?text="+msg);

cart=[];
save();
renderCart();
}

/* INIT */
renderProducts();
renderCart();

</script>

</body>
</html>
