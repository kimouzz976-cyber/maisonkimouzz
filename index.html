<section id="products" class="products-section">

  <h2>🛒 Nos produits</h2>

  <!-- SEARCH + FILTER -->
  <div class="tools">
    <input type="text" id="search" placeholder="Rechercher un produit...">

    <div class="filters">
      <button onclick="filterProducts('all')">Tous</button>
      <button onclick="filterProducts('fruits')">Fruits</button>
      <button onclick="filterProducts('boissons')">Boissons</button>
      <button onclick="filterProducts('promo')">Promotions</button>
    </div>
  </div>

  <!-- CART -->
  <div class="cart">
    🛍️ Panier : <span id="cart-count">0</span>
    <button onclick="checkoutCart()">Commander le panier</button>
  </div>

  <!-- PRODUCTS -->
  <div id="products-container" class="grid"></div>
</section>

<style>
.products-section{
  padding:60px 20px;
  background:#fff;
  color:#111;
  text-align:center;
}

#search{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #ddd;
}

.filters button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#ff7b00;
  color:white;
  cursor:pointer;
}

.cart{
  margin:20px auto;
  padding:15px;
  background:#f5f5f5;
  border-radius:10px;
  max-width:400px;
}

.cart button{
  margin-left:10px;
  padding:8px 12px;
  border:none;
  background:#25D366;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card h3{
  margin:10px 0;
}

.price{
  color:#ff7b00;
  font-weight:bold;
}

.card button{
  margin:5px;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.add{
  background:#007bff;
  color:white;
}

.whatsapp{
  background:#25D366;
  color:white;
}
</style>

<script>

// 🔥 PRODUITS
const products = [
  { name:"Mangue fraîche", price:"2€", img:"mangue.jpg", category:"fruits" },
  { name:"Banane", price:"1.5€", img:"banane.jpg", category:"fruits" },
  { name:"Jus tropical", price:"3€", img:"jus.jpg", category:"boissons" },
  { name:"Ananas promo", price:"2€", img:"ananas.jpg", category:"promo" }
];

let cart = [];
let currentCategory = "all";

// DISPLAY
function displayProducts(list){
  const container = document.getElementById("products-container");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <div class="price">${p.price}</div>

        <button class="add" onclick="addToCart('${p.name}', '${p.price}')">
          Ajouter 🛒
        </button>

        <button class="whatsapp" onclick="order('${p.name}')">
          WhatsApp
        </button>
      </div>
    `;
  });
}

// ADD TO CART
function addToCart(name, price){
  cart.push({name, price});
  document.getElementById("cart-count").innerText = cart.length;
}

// CHECKOUT CART
function checkoutCart(){
  if(cart.length === 0){
    alert("Panier vide !");
    return;
  }

  const phone = "33789583650"; // ✅ TON NUMÉRO
  let message = "Bonjour, je veux commander :%0A";

  cart.forEach(p => {
    message += `- ${p.name} (${p.price})%0A`;
  });

  window.open(`https://wa.me/${phone}?text=${message}`, "_blank");
}

// SINGLE ORDER
function order(name){
  const phone = "33789583650";
  const message = `Bonjour, je veux commander : ${name}`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, "_blank");
}

// FILTER
function filterProducts(cat){
  currentCategory = cat;
  applyFilters();
}

// SEARCH + FILTER
document.getElementById("search").addEventListener("input", applyFilters);

function applyFilters(){
  const search = document.getElementById("search").value.toLowerCase();

  let filtered = products.filter(p =>
    (currentCategory === "all" || p.category === currentCategory) &&
    p.name.toLowerCase().includes(search)
  );

  displayProducts(filtered);
}

// INIT
displayProducts(products);

</script>
