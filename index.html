<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Kimouzz - Tropical Market</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;

  /* 🌴 fond tropical */
  background: linear-gradient(
    180deg,
    #ffb703,
    #fb8500,
    #023047
  );
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:1000;
  padding:25px;
  text-align:center;
  background:rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.2);
}

header h1{
  margin:0;
  font-size:30px;
  color:#fff;
}

header p{
  margin-top:5px;
  color:#ffe8a3;
}

/* PRODUITS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  padding:25px;
}

/* CARD TROPICALE */
.card{
  background:rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:18px;
  text-align:center;
  transition:0.3s ease;
  border:1px solid rgba(255,255,255,0.2);

  opacity:0;
  transform:translateY(20px);
  animation:fadeIn 0.6s forwards;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

@keyframes fadeIn{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* IMAGE */
.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:14px;
  border:2px solid rgba(255,255,255,0.3);
}

/* TITRE */
.card h3{
  margin:10px 0 5px;
  color:#fff;
}

/* PRIX */
.price{
  color:#ffe066;
  font-weight:bold;
  margin-bottom:8px;
}

/* BOUTON */
.card button{
  background:linear-gradient(90deg,#ffdd00,#ff7b00);
  border:none;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  width:100%;
  color:black;
  transition:0.2s;
}

.card button:hover{
  transform:scale(1.05);
}

/* PANIER */
.cart{
  position:fixed;
  right:15px;
  top:90px;
  width:280px;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.2);
}

.cart h3{
  margin-top:0;
}

.item{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
  font-size:14px;
}

.remove{
  color:#ff4d4d;
  cursor:pointer;
}

.total{
  margin-top:10px;
  font-weight:bold;
}

/* WHATSAPP */
.order-btn{
  width:100%;
  margin-top:12px;
  padding:12px;
  background:#25D366;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  color:black;
}

/* FOOTER */
footer{
  margin-top:40px;
  padding:30px;
  text-align:center;
  background:rgba(0,0,0,0.3);
  border-top:1px solid rgba(255,255,255,0.2);
  color:#fff;
}

footer h2{
  color:#ffe066;
}

/* MOBILE */
@media(max-width:768px){
  .cart{
    position:static;
    width:90%;
    margin:20px auto;
  }
}
</style>
</head>

<body>

<header>
  <h1>🌴 Maison Kimouzz</h1>
  <p>Produits frais de Mayotte • Saveurs tropicales 🌺</p>
</header>

<!-- PRODUITS -->
<div class="products">

  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Banana-Single.jpg">
    <h3>Banane</h3>
    <div class="price">20€ / kg</div>
    <button onclick="add('Banane',20)">Ajouter</button>
  </div>

  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Eggs_in_a_carton.jpg">
    <h3>Œufs</h3>
    <div class="price">8€ / plateau</div>
    <button onclick="add('Œufs',8)">Ajouter</button>
  </div>

  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/50/Roast_chicken.jpg">
    <h3>Poulet</h3>
    <div class="price">10€</div>
    <button onclick="add('Poulet',10)">Ajouter</button>
  </div>

  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/50/Whole_roast_duck.jpg">
    <h3>Canard</h3>
    <div class="price">35€ - 40€</div>
    <button onclick="add('Canard',35)">Ajouter</button>
  </div>

</div>

<!-- PANIER -->
<div class="cart">
  <h3>🧺 Panier</h3>
  <div id="cart"></div>

  <div class="total">
    Total : <span id="total">0</span>€
  </div>

  <button class="order-btn" onclick="order()">Commander WhatsApp</button>
</div>

<!-- FOOTER -->
<footer>
  <h2>Maison Kimouzz</h2>
  <p>📍 281 route Ampadza, 97670 Chiconi</p>
  <p>📩 maisonkimouzz@gmail.com</p>
  <p>🚚 Livraison disponible sur demande</p>
</footer>

<script>
let cart = [];

function add(name, price){
  cart.push({name, price});
  render();
}

function removeItem(index){
  cart.splice(index,1);
  render();
}

function render(){
  let cartDiv = document.getElementById("cart");
  cartDiv.innerHTML = "";
  let total = 0;

  cart.forEach((item,i)=>{
    total += item.price;
    cartDiv.innerHTML += `
      <div class="item">
        ${item.name} - ${item.price}€
        <span class="remove" onclick="removeItem(${i})">x</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function order(){
  let msg = "Bonjour, je veux commander :\n";
  cart.forEach(item=>{
    msg += "- " + item.name + " " + item.price + "€\n";
  });

  let url = "https://wa.me/33789583650?text=" + encodeURIComponent(msg);
  window.open(url, "_blank");
}
</script>

</body>
</html>
