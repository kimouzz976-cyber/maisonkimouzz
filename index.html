<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maison Kimouzz V3</title>

<meta name="theme-color" content="#0f172a">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f6f7fb;color:#111}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#0f172a;
color:white;
position:sticky;
top:0;
}

/* HERO */
.hero{
background:#111827;
color:white;
text-align:center;
padding:60px 20px;
}
.hero h1{font-size:38px}
.hero h2{color:#4ade80}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,.05);
}

/* BUTTONS */
button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.primary{background:#0f172a;color:white}
.green{background:#16a34a;color:white}
.red{background:#ef4444;color:white}

/* CART */
.cart{
position:fixed;
right:0;
top:0;
width:380px;
height:100%;
background:white;
padding:15px;
overflow:auto;
display:none;
z-index:999;
box-shadow:-10px 0 30px rgba(0,0,0,.2);
}

/* AUTH */
#auth{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.auth-box{
background:white;
padding:20px;
border-radius:12px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

.kmz{
background:#16a34a;
color:white;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- 🔐 AUTH -->
<div id="auth">
<div class="auth-box">
<h3>🌴 Maison Kimouzz</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">

<button class="primary" onclick="login()">Connexion</button>
<button class="green" onclick="register()">Créer compte</button>
</div>
</div>

<!-- HEADER -->
<header>
<div>🌴 Kimouzz V3</div>
<div>🪙 <span id="kmz">0</span> KMZ <button onclick="toggleCart()">🛒</button></div>
</header>

<!-- HERO -->
<section class="hero">
<h1>🌴 Produire localement</h1>
<h2>Nourrir Mayotte</h2>
<p>Agriculture • Pêche • Élevage • Restauration</p>
</section>

<!-- VISION -->
<section style="padding:30px;text-align:center;">
<h2>🌍 Notre mission</h2>
<p>Construire une économie locale autonome à Mayotte.</p>
</section>

<!-- PRODUCTS -->
<section class="grid" id="products"></section>

<!-- RESTAURANTS -->
<section class="grid">
<div class="card">🐟 Poisson local</div>
<div class="card">🥘 Cuisine mahoraise</div>
<div class="card">🥩 Boucherie locale</div>
</section>

<!-- CART -->
<div class="cart" id="cart">
<h3>🛒 Panier</h3>

<div id="items"></div>

<p><b>Total:</b> <span id="total">0</span>€</p>
<p class="kmz">🪙 KMZ</p>

<button class="green" onclick="checkout()">Commander</button>
<button class="red" onclick="clearCart()">Vider</button>
<button onclick="toggleCart()">Fermer</button>

</div>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {
apiKey: "REMPLACE",
authDomain: "REMPLACE",
projectId: "REMPLACE",
storageBucket: "REMPLACE",
messagingSenderId: "REMPLACE",
appId: "REMPLACE"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user=null;

/* ================= AUTH ================= */

function register(){
let e=document.getElementById("email").value;
let p=document.getElementById("password").value;

auth.createUserWithEmailAndPassword(e,p)
.then(async u=>{
await db.collection("users").doc(u.user.uid).set({kmz:0});
user=u.user;
document.getElementById("auth").style.display="none";
});
}

function login(){
let e=document.getElementById("email").value;
let p=document.getElementById("password").value;

auth.signInWithEmailAndPassword(e,p)
.then(u=>{
user=u.user;
document.getElementById("auth").style.display="none";
});
}

/* ================= DATA ================= */

let cart=[];

const products=[
{name:"Banane",price:20,icon:"🍌"},
{name:"Œufs",price:8,icon:"🥚"},
{name:"Poulet",price:12,icon:"🐔"},
{name:"Poisson",price:25,icon:"🐟"},
{name:"Fromage",price:15,icon:"🧀"}
];

/* ================= KMZ ================= */

async function addKMZ(amount){
if(!user) return;

db.collection("users").doc(user.uid).update({
kmz: firebase.firestore.FieldValue.increment(amount)
});
}

/* ================= PRODUCTS ================= */

function renderProducts(){
let box=document.getElementById("products");
box.innerHTML="";

products.forEach(p=>{
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div style="font-size:50px">${p.icon}</div>
<h3>${p.name}</h3>
<p>${p.price}€</p>
`;

let btn=document.createElement("button");
btn.className="primary";
btn.innerText="Ajouter";

btn.onclick=()=>{
add(p);
};

div.appendChild(btn);
box.appendChild(div);
});
}

function add(p){

let item=cart.find(i=>i.name===p.name);

if(item) item.qty++;
else cart.push({...p,qty:1});

addKMZ(1);

renderCart();
}

/* ================= CART ================= */

function renderCart(){

let box=document.getElementById("items");
box.innerHTML="";

let total=0;

cart.forEach(i=>{
total+=i.price*i.qty;

let div=document.createElement("div");
div.innerText=`${i.name} x${i.qty}`;
box.appendChild(div);
});

document.getElementById("total").innerText=total;
}

function clearCart(){
cart=[];
renderCart();
}

/* ================= CHECKOUT ================= */

function checkout(){

let total=cart.reduce((a,b)=>a+b.price*b.qty,0);

db.collection("orders").add({
user:user.uid,
cart:cart,
total:total,
date:new Date()
});

window.open("https://wa.me/33789583650?text="+encodeURIComponent("Commande: "+total));
}

/* ================= UI ================= */

function toggleCart(){
let c=document.getElementById("cart");
c.style.display=c.style.display==="block"?"none":"block";
}

/* ================= INIT ================= */

renderProducts();

</script>

</body>
</html>
